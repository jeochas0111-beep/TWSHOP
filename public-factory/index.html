<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Twodrapes 管理端</title>
  <link rel="stylesheet" href="/css/factory.css?v=20260613-ui-opt">
  <link rel="stylesheet" href="/css/twodrapes-theme.css">
  <script src="/js/channel-theme.js"></script>
</head>
<body>
  <header class="topbar">
    <div>
      <h1>Twodrapes 管理端</h1>
    </div>
    <nav class="tab-nav" role="tablist" aria-label="管理端导航">
      <button id="tab-summary" class="active" data-tab="summary" role="tab" aria-selected="true" aria-controls="page-summary">订单汇总</button>
      <button id="tab-analytics" data-tab="analytics" role="tab" aria-selected="false" aria-controls="page-analytics">数据分析</button>
      <button id="tab-params" data-tab="params" role="tab" aria-selected="false" aria-controls="page-params">参数设置</button>
      <button id="tab-users" data-tab="users" role="tab" aria-selected="false" aria-controls="page-users">用户管理</button>
    </nav>
    <div class="notify-wrap">
      <button class="notify-btn" id="notifyBtn" type="button" aria-label="提醒">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <span class="notify-badge hidden" id="notifyBadge"></span>
      </button>
      <div class="notify-panel hidden" id="notifyPanel">
        <div class="notify-panel-header"><h3>提醒</h3><span class="notify-panel-count hidden" id="notifyPanelCount"></span></div>
        <div id="notifyContent"></div>
      </div>
    </div>
  </header>

  <main>
    <div id="toast" class="toast hidden" aria-live="polite" role="status"></div>

    <section id="page-summary" class="page active" role="tabpanel" aria-labelledby="tab-summary">
      <article class="card">
        <div class="card-header">
          <div class="section-title">
            <h2>订单汇总</h2>
            <div class="toolbar">
              <button class="btn secondary small" id="summaryExportBtn">导出 CSV</button>
              <button class="btn secondary small" id="summaryFullExportBtn">导出全部订单信息</button>
              <button class="btn secondary small" id="summaryRefreshBtn">刷新</button>
            </div>
          </div>
        </div>
        <div class="summary-stats" id="summaryStats"></div>
        <div class="summary-filters">
          <div class="filter-field orders-search-field">
            <label>搜索</label>
            <svg class="filter-search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            <input id="summarySearchInput" type="search" autocomplete="off" placeholder="订单号 / 客户">
            <button class="filter-clear" type="button">&times;</button>
          </div>
          <div class="filter-field">
            <label>下单起始</label>
            <input id="summaryDateFrom" type="date">
            <button class="filter-clear" type="button">&times;</button>
          </div>
          <div class="filter-field">
            <label>下单截止</label>
            <input id="summaryDateTo" type="date">
            <button class="filter-clear" type="button">&times;</button>
          </div>
          <div class="filter-field">
            <label>渠道</label>
            <select id="summaryChannelFilter">
              <option value="">全部</option>
              <option value="shopify">独立站</option>
              <option value="amazon">亚马逊</option>
            </select>
            <button class="filter-clear" type="button">&times;</button>
          </div>
          <div class="filter-field">
            <label>状态</label>
            <select id="summaryStatusFilter">
              <option value="">全部</option>
              <option value="production">待生产</option>
              <option value="shipping">待发货</option>
              <option value="completed">完成</option>
            </select>
            <button class="filter-clear" type="button">&times;</button>
          </div>
        </div>
        <div class="period-bar">
          <button class="period-btn active" data-period="all" type="button">全部</button>
          <button class="period-btn" data-period="month" type="button">本月</button>
          <button class="period-btn" data-period="lastMonth" type="button">上月</button>
          <button class="period-btn" data-period="3months" type="button">近 3 月</button>
          <button class="period-btn" data-period="6months" type="button">近 6 月</button>
        </div>
        <div id="summaryFilterChips" class="filter-chips"></div>
        <div class="table-wrap"><table id="summaryTable"></table></div>
      </article>
    </section>

    <section id="page-analytics" class="page" role="tabpanel" aria-labelledby="tab-analytics" style="display:none">
      <article class="card analytics-card">
        <div class="card-header">
          <div class="section-title">
            <div>
              <h2>数据分析</h2>
              <p class="section-subtitle">按渠道分别统计收入、支出、利润和产品数据。独立站含税费，亚马逊独立核算。</p>
            </div>
            <div class="toolbar">
              <button class="btn secondary small" id="analyticsResetBtn" type="button">重置筛选</button>
              <button class="btn secondary small" id="analyticsRefreshBtn" type="button">刷新</button>
            </div>
          </div>
        </div>

        <div class="analytics-filters">
          <label>开始日期<input id="analyticsDateFrom" type="date"></label>
          <label>结束日期<input id="analyticsDateTo" type="date"></label>
          <label>产品
            <select id="analyticsProductFilter"><option value="">全部产品</option></select>
          </label>
        </div>

        <div id="analyticsStatus" class="notice hidden" aria-live="polite"></div>

        <div class="analytics-channel-toggle">
          <button class="analytics-channel-btn active" data-analytics-channel="shopify" type="button">独立站</button>
          <button class="analytics-channel-btn" data-analytics-channel="amazon" type="button">亚马逊</button>
        </div>

        <!-- ===== 独立站 (Shopify) ===== -->
        <div class="channel-section" id="analyticsShopifySection">
          <div class="channel-section-header">
            <h3>独立站</h3>
          </div>
          <div id="shopifyAnalyticsSummary" class="analytics-summary-grid"></div>
          <div class="analytics-grid">
            <section class="analytics-panel analytics-panel-wide">
              <div class="section-title compact"><h3>收支趋势</h3></div>
              <div id="shopifyTrendChart" class="analytics-chart empty">暂无数据 — 完成订单后数据将显示在此处</div>
              <div class="trend-legend">
                <span class="trend-legend-item"><span class="trend-legend-color" style="background:var(--chart-income)"></span>收入</span>
                <span class="trend-legend-item"><span class="trend-legend-color" style="background:var(--chart-cost)"></span>支出</span>
                <span class="trend-legend-item"><span class="trend-legend-color" style="background:var(--chart-profit)"></span>利润</span>
              </div>
            </section>
            <section class="analytics-panel">
              <div class="section-title compact"><h3>支出结构</h3></div>
              <div id="shopifyExpenseChart" class="analytics-expense-chart empty">暂无数据 — 完成订单后数据将显示在此处</div>
            </section>
          </div>
          <section class="analytics-panel product-analytics-panel">
            <div class="section-title compact">
              <h3>产品对比</h3>
              <label class="analytics-sort-label">排序
                <select class="analytics-product-sort" data-channel="shopify">
                  <option value="income">按收入</option>
                  <option value="profit">按利润</option>
                  <option value="rate">按利润率</option>
                  <option value="qty">按销量</option>
                </select>
              </label>
            </div>
            <div class="table-wrap analytics-table-wrap"><table id="shopifyProductTable"></table></div>
          </section>
        </div>

        <!-- ===== 亚马逊 (Amazon) ===== -->
        <div class="channel-section" id="analyticsAmazonSection" style="display:none">
          <div class="channel-section-header">
            <h3>亚马逊</h3>
          </div>
          <div id="amazonAnalyticsSummary" class="analytics-summary-grid"></div>
          <div class="analytics-grid">
            <section class="analytics-panel analytics-panel-wide">
              <div class="section-title compact"><h3>收支趋势</h3></div>
              <div id="amazonTrendChart" class="analytics-chart empty">暂无数据 — 完成订单后数据将显示在此处</div>
              <div class="trend-legend">
                <span class="trend-legend-item"><span class="trend-legend-color" style="background:var(--chart-income)"></span>收入</span>
                <span class="trend-legend-item"><span class="trend-legend-color" style="background:var(--chart-cost)"></span>支出</span>
                <span class="trend-legend-item"><span class="trend-legend-color" style="background:var(--chart-profit)"></span>利润</span>
              </div>
            </section>
            <section class="analytics-panel">
              <div class="section-title compact"><h3>支出结构</h3></div>
              <div id="amazonExpenseChart" class="analytics-expense-chart empty">暂无数据 — 完成订单后数据将显示在此处</div>
            </section>
          </div>
          <section class="analytics-panel product-analytics-panel">
            <div class="section-title compact">
              <h3>产品对比</h3>
              <label class="analytics-sort-label">排序
                <select class="analytics-product-sort" data-channel="amazon">
                  <option value="income">按收入</option>
                  <option value="profit">按利润</option>
                  <option value="rate">按利润率</option>
                  <option value="qty">按销量</option>
                </select>
              </label>
            </div>
            <div class="table-wrap analytics-table-wrap"><table id="amazonProductTable"></table></div>
          </section>
        </div>
      </article>
    </section>

    <section id="page-params" class="page" role="tabpanel" aria-labelledby="tab-params" style="display:none">
      <article class="card">
        <div class="card-header">
          <div class="section-title">
            <h2>参数设置</h2>
            <div class="toolbar">
              <button class="btn secondary small" id="refreshParamsBtn">刷新</button>
              <button class="btn primary small" id="saveParamsBtn">保存参数</button>
            </div>
          </div>
        </div>
        <div id="paramsSummary" class="notice">加载中...</div>
        <div id="paramsStatus" class="notice hidden" aria-live="polite"></div>
        <div id="paramsContent" class="params-content"></div>
      </article>
    </section>

    <section id="page-users" class="page" role="tabpanel" aria-labelledby="tab-users" style="display:none">
      <article class="card users-card">
        <div class="card-header">
          <div class="section-title">
            <h2>用户管理</h2>
            <div class="toolbar users-toolbar">
              <label class="users-filter-label">渠道
                <select id="userChannelFilter">
                  <option value="">全部渠道</option>
                  <option value="shopify">独立站</option>
                  <option value="amazon">亚马逊</option>
                </select>
              </label>
              <button class="btn primary small" id="addUserBtn">新增用户</button>
            </div>
          </div>
        </div>

        <div id="userForm" class="user-form-panel hidden">
          <div class="user-form-grid">
            <label>渠道
              <select id="userFormChannel">
                <option value="shopify">独立站</option>
                <option value="amazon">亚马逊</option>
              </select>
            </label>
            <label>用户名
              <input id="userFormUsername" type="text" placeholder="登录用户名">
            </label>
            <label>新密码
              <input id="userFormPassword" type="password" placeholder="留空则不修改">
            </label>
            <div class="user-form-actions">
              <button class="btn primary small" id="userFormSaveBtn">保存</button>
              <button class="btn secondary small" id="userFormCancelBtn">取消</button>
            </div>
          </div>
        </div>

        <div class="table-wrap users-table-wrap"><table id="usersTable"></table></div>
      </article>
    </section>
  </main>

  <div id="orderDetailModal" class="modal hidden" role="dialog" aria-modal="true" aria-label="订单详情">
    <div class="modal-backdrop" id="closeOrderDetailModal"></div>
    <div class="modal-panel">
      <div class="section-title">
        <h3 id="orderDetailTitle">订单详情</h3>
        <button class="btn small secondary" id="closeOrderDetailBtn" type="button">关闭</button>
      </div>
      <div id="orderDetailContent"></div>
    </div>
  </div>

  <script src="/js/factory.js?v=20260613-ui-opt"></script>
</body>
</html>

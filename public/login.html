<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TWODRAPES ERP - 登录</title>
  <link rel="stylesheet" href="/css/app.css?v=20260619-login-opt">
  <link rel="stylesheet" href="/css/twodrapes-theme.css">
  <script src="/js/channel-theme.js"></script>
  <style>
    /* ── Reset & Page ────────────────────────────── */
    :root { color-scheme: light; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", "Helvetica Neue", Arial, sans-serif;
      background:
        radial-gradient(circle at 20% 10%, rgba(64, 156, 255, 0.12), transparent 28%),
        radial-gradient(circle at 80% 0%, rgba(165, 120, 255, 0.10), transparent 32%),
        linear-gradient(180deg, #f7f9fc 0%, #eef2f7 100%);
    }
    @media (prefers-color-scheme: dark) {
      body {
        background:
          radial-gradient(circle at 20% 10%, rgba(59, 130, 246, 0.12), transparent 28%),
          linear-gradient(180deg, #020617 0%, #0f172a 100%);
      }
    }

    /* ── Shell Grid ──────────────────────────────── */
    .login-shell {
      width: min(100%, 1120px);
      display: grid;
      grid-template-columns: 0.88fr 1.12fr;
      gap: 22px;
      align-items: stretch;
    }
    @media (max-width: 920px) {
      .login-shell { grid-template-columns: 1fr; }
    }

    /* ── Shared Card ─────────────────────────────── */
    .login-card {
      position: relative;
      border-radius: 28px;
      border: 1px solid rgba(255, 255, 255, 0.60);
      background: rgba(255, 255, 255, 0.78);
      backdrop-filter: blur(20px) saturate(150%);
      -webkit-backdrop-filter: blur(20px) saturate(150%);
      box-shadow:
        0 24px 80px rgba(31, 41, 55, 0.10),
        inset 0 1px 0 rgba(255, 255, 255, 0.60);
      overflow: hidden;
    }
    @media (prefers-color-scheme: dark) {
      .login-card {
        border-color: rgba(255, 255, 255, 0.10);
        background: rgba(15, 23, 42, 0.75);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.30), inset 0 1px 0 rgba(255,255,255,0.05);
      }
    }

    /* ── Left Panel ──────────────────────────────── */
    .login-left {
      padding: 32px 28px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .login-brand {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .login-kicker {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: fit-content;
      padding: 6px 14px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.72);
      background: rgba(255, 255, 255, 0.60);
      font-size: 12px;
      font-weight: 600;
      color: rgba(28, 44, 70, 0.70);
      letter-spacing: 0.3px;
    }
    .login-left h1 {
      font-size: clamp(26px, 3vw, 34px);
      line-height: 1.10;
      color: #162132;
      font-weight: 800;
      letter-spacing: -0.3px;
    }
    .login-left-desc {
      color: rgba(28, 44, 70, 0.68);
      font-size: 14px;
      line-height: 1.65;
    }

    /* Feature cards */
    .login-features {
      display: grid;
      gap: 12px;
      margin-top: auto;
    }
    .login-feature {
      padding: 16px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.58);
      border: 1px solid rgba(226, 232, 240, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }
    .login-feature:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(31, 41, 55, 0.08);
    }
    @media (prefers-color-scheme: dark) {
      .login-feature {
        background: rgba(255, 255, 255, 0.05);
        border-color: rgba(255, 255, 255, 0.08);
      }
    }
    .login-feature-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      margin-bottom: 10px;
      background: linear-gradient(135deg, rgba(59,130,246,0.12), rgba(139,92,246,0.10));
      color: #3b82f6;
    }
    .login-feature strong {
      display: block;
      color: #172234;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .login-feature span {
      color: rgba(28, 44, 70, 0.62);
      font-size: 13px;
      line-height: 1.55;
    }
    @media (prefers-color-scheme: dark) {
      .login-feature strong { color: #e2e8f0; }
      .login-feature span { color: rgba(226, 232, 240, 0.55); }
    }

    /* ── Right Panel ─────────────────────────────── */
    .login-right {
      padding: 32px 28px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    .login-stage-head h2 {
      font-size: 22px;
      color: #172234;
      font-weight: 800;
      margin-bottom: 6px;
      letter-spacing: -0.2px;
    }
    .login-stage-head p {
      color: rgba(28, 44, 70, 0.62);
      font-size: 13px;
      line-height: 1.55;
    }
    @media (prefers-color-scheme: dark) {
      .login-stage-head h2 { color: #e2e8f0; }
      .login-stage-head p { color: rgba(226,232,240,0.50); }
    }

    /* ── Form Card ───────────────────────────────── */
    .login-form-card {
      padding: 20px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid rgba(223, 232, 243, 0.94);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.72);
    }
    @media (prefers-color-scheme: dark) {
      .login-form-card {
        background: rgba(255,255,255,0.04);
        border-color: rgba(255,255,255,0.08);
      }
    }

    /* ── Fields ──────────────────────────────────── */
    .login-form-grid {
      display: grid;
      gap: 16px;
    }
    .login-field {
      display: grid;
      gap: 7px;
    }
    .login-field label {
      color: #162132;
      font-size: 13px;
      font-weight: 700;
    }
    @media (prefers-color-scheme: dark) {
      .login-field label { color: #e2e8f0; }
    }
    .login-field input {
      width: 100%;
      height: 46px;
      padding: 0 14px;
      border-radius: 14px;
      border: 1px solid rgba(207, 218, 232, 0.92);
      background: rgba(247, 250, 253, 0.98);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.86);
      font-size: 14px;
      color: #172234;
      transition: border-color 0.16s ease, box-shadow 0.16s ease, background 0.16s ease;
    }
    .login-field input::placeholder {
      color: rgba(28, 44, 70, 0.35);
    }
    .login-field input:focus {
      outline: none;
      border-color: rgba(59, 130, 246, 0.70);
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.14);
      background: #fff;
    }
    .login-field input.has-error {
      border-color: rgba(220, 53, 69, 0.55);
      box-shadow: 0 0 0 4px rgba(220, 53, 69, 0.10);
    }
    @media (prefers-color-scheme: dark) {
      .login-field input {
        border-color: rgba(255,255,255,0.10);
        background: rgba(15,23,42,0.70);
        color: #e2e8f0;
      }
      .login-field input::placeholder { color: rgba(226,232,240,0.35); }
      .login-field input:focus {
        border-color: rgba(59,130,246,0.60);
        box-shadow: 0 0 0 4px rgba(59,130,246,0.12);
        background: rgba(15,23,42,0.90);
      }
    }

    /* ── Error Alert ─────────────────────────────── */
    .login-alert {
      display: none;
      align-items: flex-start;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 13px;
      line-height: 1.5;
    }
    .login-alert.visible {
      display: flex;
    }
    .login-alert-icon {
      flex-shrink: 0;
      margin-top: 1px;
      font-size: 15px;
    }
    .login-alert--error {
      border: 1px solid rgba(220, 53, 69, 0.22);
      background: rgba(254, 242, 242, 0.92);
      color: #991b1b;
    }
    .login-alert--warning {
      border: 1px solid rgba(234, 179, 8, 0.22);
      background: rgba(254, 249, 195, 0.92);
      color: #92400e;
    }
    .login-alert--info {
      border: 1px solid rgba(59, 130, 246, 0.22);
      background: rgba(239, 246, 255, 0.92);
      color: #1e40af;
    }
    @media (prefers-color-scheme: dark) {
      .login-alert--error {
        border-color: rgba(220,53,69,0.18);
        background: rgba(220,53,69,0.10);
        color: #fca5a5;
      }
      .login-alert--warning {
        border-color: rgba(234,179,8,0.18);
        background: rgba(234,179,8,0.10);
        color: #fde047;
      }
      .login-alert--info {
        border-color: rgba(59,130,246,0.18);
        background: rgba(59,130,246,0.10);
        color: #93c5fd;
      }
    }

    /* ── Login Button ────────────────────────────── */
    .login-btn {
      width: 100%;
      height: 46px;
      border: 0;
      border-radius: 14px;
      background: linear-gradient(180deg, #2563eb 0%, #1d4ed8 100%);
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.2px;
      cursor: pointer;
      box-shadow:
        0 12px 28px rgba(37, 99, 235, 0.22),
        inset 0 1px 0 rgba(255, 255, 255, 0.18);
      transition: transform 0.12s ease, box-shadow 0.16s ease, opacity 0.16s ease;
    }
    .login-btn:hover:not(:disabled) {
      background: linear-gradient(180deg, #1d4ed8 0%, #1e40af 100%);
      box-shadow:
        0 16px 36px rgba(37, 99, 235, 0.28),
        inset 0 1px 0 rgba(255, 255, 255, 0.18);
      transform: translateY(-1px);
    }
    .login-btn:active:not(:disabled) {
      transform: translateY(0) scale(0.985);
    }
    .login-btn:disabled {
      cursor: not-allowed;
      opacity: 0.62;
      box-shadow: none;
      transform: none;
    }
    .login-btn .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.30);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── Helper / Footer ─────────────────────────── */
    .login-helper {
      text-align: center;
      color: rgba(28, 44, 70, 0.48);
      font-size: 12px;
      line-height: 1.5;
      margin-top: 2px;
    }
    @media (prefers-color-scheme: dark) {
      .login-helper { color: rgba(226,232,240,0.38); }
    }

    /* ── Destination Card (admin post-login) ─────── */
    .login-dest-card {
      display: none;
      padding: 18px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid rgba(223, 232, 243, 0.94);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.72);
    }
    .login-dest-card.visible { display: block; }
    .login-dest-title {
      font-size: 14px;
      font-weight: 700;
      color: #162132;
      margin-bottom: 12px;
    }
    .login-dest-list {
      display: grid;
      gap: 10px;
    }
    .login-dest-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border-radius: 18px;
      border: 1px solid rgba(214, 223, 235, 0.94);
      background: rgba(247, 250, 253, 0.98);
      color: #172234;
      cursor: pointer;
      transition: border-color 0.16s ease, transform 0.16s ease, box-shadow 0.16s ease;
      font-family: inherit;
    }
    .login-dest-btn:hover {
      border-color: rgba(59, 130, 246, 0.55);
      transform: translateY(-1px);
      box-shadow: 0 12px 28px rgba(31, 41, 55, 0.10);
    }
    .login-dest-btn strong,
    .login-dest-btn small {
      display: block;
      text-align: left;
    }
    .login-dest-btn strong { font-size: 14px; }
    .login-dest-btn small {
      margin-top: 3px;
      color: rgba(28, 44, 70, 0.55);
      font-size: 12px;
    }

    /* ── Mobile ──────────────────────────────────── */
    @media (max-width: 920px) {
      .login-left { order: 2; }
      .login-right { order: 1; }
      .login-stage-head { flex-direction: column; }
    }
    @media (max-width: 560px) {
      body { padding: 14px; }
      .login-left, .login-right {
        padding: 22px 20px;
        border-radius: 24px;
      }
      .login-features { gap: 10px; }
    }
  </style>
</head>
<body>
  <main class="login-shell">

    <!-- ─── Left Panel: Brand + Features ────────── -->
    <section class="login-card login-left">
      <div class="login-brand">
        <span class="login-kicker">TWODRAPES ERP</span>
        <h1>统一工作入口</h1>
        <p class="login-left-desc">一个账号连接管理端、独立站与亚马逊运营端。系统会根据账号权限自动进入对应工作台。</p>
      </div>

      <div class="login-features">
        <div class="login-feature">
          <div class="login-feature-icon">&#x1f504;</div>
          <strong>多端统一认证</strong>
          <span>根据账号权限自动进入对应工作端，无需手动选择。</span>
        </div>
        <div class="login-feature">
          <div class="login-feature-icon">&#x1f6e1;&#xfe0f;</div>
          <strong>渠道权限隔离</strong>
          <span>独立站与亚马逊账号分渠道管理，数据互不干扰。</span>
        </div>
        <div class="login-feature">
          <div class="login-feature-icon">&#x1f512;</div>
          <strong>安全登录</strong>
          <span>管理员入口需要账号、密码与权限匹配。</span>
        </div>
      </div>
    </section>

    <!-- ─── Right Panel: Login Form ─────────────── -->
    <section class="login-card login-right">
      <div class="login-stage-head">
        <h2>登录到 TWODRAPES</h2>
        <p>请输入账号和密码，系统将根据权限自动进入对应工作端。</p>
      </div>

      <!-- Error Alert -->
      <div class="login-alert login-alert--error" id="loginAlert" role="alert" aria-live="assertive">
        <span class="login-alert-icon">&#x26a0;&#xfe0f;</span>
        <span id="loginAlertText"></span>
      </div>

      <!-- Form -->
      <div class="login-form-card">
        <form id="loginForm" class="login-form-grid" autocomplete="on" novalidate>
          <div class="login-field">
            <label for="username">用户名</label>
            <input id="username" type="text" name="username" autocomplete="username" placeholder="请输入用户名" required autofocus>
          </div>
          <div class="login-field">
            <label for="password">密码</label>
            <input id="password" type="password" name="current-password" autocomplete="current-password" placeholder="请输入密码" required>
          </div>

          <button class="login-btn" id="loginBtn" type="submit">登录</button>

          <p class="login-helper">登录后系统会根据账号权限自动进入管理端或对应运营端。</p>
        </form>
      </div>

      <!-- Destination Picker (admin only, shown after login) -->
      <div class="login-dest-card" id="destinationCard">
        <div class="login-dest-title">选择要进入的端</div>
        <div class="login-dest-list" id="destinationList"></div>
      </div>
    </section>

  </main>

  <script>
    (function () {
      /* ── Constants ──────────────────────────────── */
      const APP_PORTS  = { shopify: '8080', management: '8081', amazon: '8082' };
      const APP_LABELS = {
        shopify:     '独立站运营端',
        amazon:      '亚马逊运营端',
        management:  '管理端'
      };
      /* ── Detect current app ─────────────────────── */
      const currentApp = Object.keys(APP_PORTS).find(
        (k) => String(APP_PORTS[k]) === String(location.port)
      ) || 'shopify';

      /* ── DOM refs ───────────────────────────────── */
      const loginForm        = document.getElementById('loginForm');
      const loginBtn         = document.getElementById('loginBtn');
      const loginAlert       = document.getElementById('loginAlert');
      const loginAlertText   = document.getElementById('loginAlertText');
      const destinationCard  = document.getElementById('destinationCard');
      const destinationList  = document.getElementById('destinationList');
      const usernameInput    = document.getElementById('username');
      const passwordInput    = document.getElementById('password');

      /* ── Helpers ────────────────────────────────── */
      function clearSession() {
        localStorage.removeItem('twodrapes_token');
        localStorage.removeItem('twodrapes_user');
      }

      function writeSession(token, user) {
        localStorage.setItem('twodrapes_token', token);
        localStorage.setItem('twodrapes_user', JSON.stringify(user));
      }

      function redirectToPort(port) {
        if (String(port) === String(location.port)) {
          location.href = '/';
          return;
        }
        location.href = '//' + location.hostname + ':' + port + '/';
      }

      /* ── Alert helpers ──────────────────────────── */
      function showAlert(msg, type) {
        loginAlert.className = 'login-alert login-alert--' + (type || 'error') + ' visible';
        loginAlertText.textContent = msg;
      }
      function hideAlert() {
        loginAlert.className = 'login-alert';
        loginAlertText.textContent = '';
      }

      /* ── Input error styling ────────────────────── */
      function markInputError(input, hasErr) {
        if (hasErr) {
          input.classList.add('has-error');
        } else {
          input.classList.remove('has-error');
        }
      }

      /* ── Button loading state ───────────────────── */
      function setLoading(loading) {
        loginBtn.disabled = loading;
        if (loading) {
          loginBtn.innerHTML = '<span class="spinner"></span>登录中...';
        } else {
          loginBtn.textContent = '登录';
        }
      }

      /* ── API calls ──────────────────────────────── */
      async function verifyToken(token, channel) {
        const body = channel ? { token, channel } : { token };
        const res = await fetch('/api/auth/verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        return res.json().catch(() => ({ ok: false }));
      }

      async function fetchChannels(token) {
        const res = await fetch('/api/auth/channels', {
          headers: { Authorization: 'Bearer ' + token }
        });
        return res.json().catch(() => ({ ok: false }));
      }

      /* ── Destination picker (admin) ─────────────── */
      function showDestinations(channels) {
        destinationCard.classList.add('visible');
        loginForm.style.display = 'none';
        destinationList.innerHTML = '';

        const items = [];
        if (currentApp === 'management') {
          items.push({ app: 'management', label: APP_LABELS.management, port: APP_PORTS.management, desc: '查看订单汇总、分析和用户管理。' });
        }
        (channels || []).forEach((ch) => {
          items.push({
            app: ch,
            label: APP_LABELS[ch],
            port: APP_PORTS[ch],
            desc: ch === 'shopify' ? '进入独立站订单运营与产品控制。' : '进入亚马逊订单运营与产品控制。'
          });
        });

        items.forEach((item) => {
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'login-dest-btn';
          btn.dataset.port = item.port;
          btn.innerHTML = '<span><strong>' + item.label + '</strong><small>' + item.desc + '</small></span>';
          btn.addEventListener('click', () => redirectToPort(item.port));
          destinationList.appendChild(btn);
        });
      }

      /* ── Route after login ──────────────────────── */
      async function routeAfterLogin(user, token) {
        const channelData = await fetchChannels(token);
        if (!channelData.ok) {
          throw new Error(channelData.error || '无法获取可访问端信息');
        }

        if (user.role === 'admin') {
          if (currentApp === 'management') {
            showDestinations(channelData.channels || []);
            return;
          }
          redirectToPort(APP_PORTS[currentApp]);
          return;
        }

        const targetPort = APP_PORTS[user.channel] || APP_PORTS.shopify;
        redirectToPort(targetPort);
      }

      /* ── Restore existing session ───────────────── */
      async function restoreExistingSession() {
        const token = localStorage.getItem('twodrapes_token');
        if (!token) return;
        const verifyChannel = currentApp === 'management' ? null : currentApp;
        const verifyData = await verifyToken(token, verifyChannel);
        if (!verifyData.ok || !verifyData.user) {
          clearSession();
          return;
        }
        localStorage.setItem('twodrapes_user', JSON.stringify(verifyData.user));
        await routeAfterLogin(verifyData.user, token);
      }

      /* ── Login submission ───────────────────────── */
      loginForm.addEventListener('submit', async (event) => {
        event.preventDefault();
        hideAlert();
        markInputError(usernameInput, false);
        markInputError(passwordInput, false);

        const username = usernameInput.value.trim();
        const password = passwordInput.value;

        /* Client-side validation */
        if (!username && !password) {
          showAlert('用户名和密码不能为空。', 'error');
          markInputError(usernameInput, true);
          markInputError(passwordInput, true);
          usernameInput.focus();
          return;
        }
        if (!username) {
          showAlert('请输入用户名。', 'error');
          markInputError(usernameInput, true);
          usernameInput.focus();
          return;
        }
        if (!password) {
          showAlert('请输入密码。', 'error');
          markInputError(passwordInput, true);
          passwordInput.focus();
          return;
        }

        setLoading(true);

        try {
          let data = null;
          let response = null;

          if (currentApp === 'management') {
            /* Management portal: try both channels (backend requires channel field) */
            const channels = ['shopify', 'amazon'];
            for (const ch of channels) {
              response = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ channel: ch, username, password })
              });
              data = await response.json().catch(() => ({ ok: false, error: '登录失败' }));
              if (response.ok && data.ok && data.token && data.user) {
                break;
              }
              /* 401 means wrong credentials — stop immediately, don't try next channel */
              if (response.status === 401) {
                break;
              }
              /* 400 "请选择渠道并输入用户名和密码" should not happen, but handle gracefully */
            }
          } else {
            /* Operations portal: no channel field needed */
            response = await fetch('/api/auth/login', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ username, password })
            });
            data = await response.json().catch(() => ({ ok: false, error: '登录失败' }));
          }

          if (!response.ok || !data.ok || !data.token || !data.user) {
            const errorMsg = data.error || '登录失败，请稍后重试';
            /* Map server errors to friendly messages */
            if (response.status === 401) {
              showAlert('账号或密码错误，请检查后重试。', 'error');
            } else if (response.status === 429) {
              showAlert('登录尝试过多，请稍后再试。', 'error');
            } else if (response.status >= 500) {
              showAlert('服务暂时不可用，请稍后重试。', 'error');
            } else if (errorMsg.includes('渠道')) {
              showAlert('当前账号暂无管理端访问权限，请使用已授权账号登录。', 'warning');
            } else {
              showAlert(errorMsg, 'error');
            }
            setLoading(false);
            return;
          }

          writeSession(data.token, data.user);
          await routeAfterLogin(data.user, data.token);
        } catch (error) {
          /* Network / unexpected errors */
          if (error.name === 'TypeError' && error.message.includes('fetch')) {
            showAlert('网络连接异常，请检查网络后重试。', 'error');
          } else {
            showAlert('服务暂时不可用，请稍后重试。', 'error');
          }
          clearSession();
          setLoading(false);
        }
      });

      /* ── Clear error state on input ─────────────── */
      usernameInput.addEventListener('input', () => {
        markInputError(usernameInput, false);
        if (loginAlert.classList.contains('visible') && !usernameInput.value.trim()) {
          /* keep alert if username is cleared */
        } else {
          hideAlert();
        }
      });
      passwordInput.addEventListener('input', () => {
        markInputError(passwordInput, false);
        hideAlert();
      });

      /* ── Init ───────────────────────────────────── */
      restoreExistingSession().catch(() => { clearSession(); });
    })();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Twodrapes 生产端</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='18' fill='%23523A28'/%3E%3Cpath d='M18 18h28v8H36v20h-8V26H18z' fill='white'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="/css/production.css">
  <link rel="stylesheet" href="/css/twodrapes-theme.css">
  <script src="/js/channel-theme.js"></script>
</head>
<body>
  <!-- Theme Toggle -->
  <div class="theme-toggle-wrap" style="position:fixed;top:16px;right:16px;z-index:100">
    <button class="theme-toggle-btn active" id="themeLightBtn" type="button" data-theme-value="light">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      <span>Light</span>
    </button>
    <button class="theme-toggle-btn" id="themeDarkBtn" type="button" data-theme-value="dark">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <span>Dark</span>
    </button>
  </div>

  <!-- Login Page -->
  <div id="loginPage" class="login-page">
    <div class="login-card">
      <div class="login-header">
        <div class="login-logo">
          <svg width="32" height="32" viewBox="0 0 64 64"><rect width="64" height="64" rx="18" fill="%23523A28"/><path d="M18 18h28v8H36v20h-8V26H18z" fill="white"/></svg>
        </div>
        <h1>Twodrapes 生产端</h1>
        <p>工厂生产管理系统</p>
      </div>
      <form id="loginForm">
        <div class="form-group">
          <label for="username">用户名</label>
          <input type="text" id="username" name="username" autocomplete="username" required>
        </div>
        <div class="form-group">
          <label for="password">密码</label>
          <input type="password" id="password" name="current-password" autocomplete="current-password" required>
        </div>
        <div id="loginError" class="error-message hidden"></div>
        <button type="submit" class="btn-primary">登录</button>
      </form>
    </div>
  </div>

  <!-- Main App -->
  <div id="appPage" class="app-page hidden">
    <header class="topbar">
      <div class="topbar-left">
        <h1>Twodrapes 生产端</h1>
      </div>
      <div class="topbar-right">
        <span id="userDisplay" class="user-display"></span>
        <button id="logoutBtn" class="btn-secondary" type="button">退出</button>
      </div>
    </header>

    <main class="main-content">
      <!-- Order List -->
      <section id="orderListSection">
        <div class="section-header">
          <h2>生产订单</h2>
          <div class="filter-bar">
            <input type="text" id="searchInput" placeholder="搜索订单号/客户名..." class="search-input">
            <select id="statusFilter" class="status-select">
              <option value="production">待生产</option>
              <option value="all">全部</option>
            </select>
          </div>
        </div>
        <div id="orderGrid" class="order-grid">
          <div class="empty-state">加载中...</div>
        </div>
      </section>

      <!-- Order Detail Modal -->
      <div id="orderModal" class="modal hidden">
        <div class="modal-backdrop" id="closeModal"></div>
        <div class="modal-panel">
          <div class="modal-header">
            <h3 id="modalTitle">订单详情</h3>
            <button id="closeModalBtn" class="btn-close" type="button">&times;</button>
          </div>
          <div class="modal-body" id="modalBody"></div>
        </div>
      </div>
    </main>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="/js/production.js"></script>
</body>
</html>
